<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Librarium - Твоя цифровая библиотека. Тысячи книг, аудиокниг и комиксов доступны бесплатно.">
    <meta name="theme-color" content="#0A0A0A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts with preload for performance -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
    
    <!-- Favicon -->
    <link rel="icon" href="img/logo2.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="img/logo2.svg">
    
    <title>Либрариум</title>
    
    <!-- Critical CSS for initial load -->
    <style>
        /* Prevent FOUC (Flash of Unstyled Content) */
        html {
            background-color: #0A0A0A;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A0A;
            color: #FFFFFF;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Initial loading state */
        #root:empty::before {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 100px auto;
            border: 3px solid rgba(255, 107, 53, 0.2);
            border-top-color: #FF6B35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
