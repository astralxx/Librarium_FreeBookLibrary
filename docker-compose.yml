services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: librarium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    ports:
      - "3000:3000"
    env_file: ./auth-service/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: librarium
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  books-service:
    build: ./books-service
    ports:
      - "3001:3001"
    env_file: ./books-service/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: librarium
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    env_file: ./gateway/.env
    depends_on:
      - auth-service
      - books-service
    restart: unless-stopped

volumes:
  postgres_data: