services:
  postgres:
    image: postgres:16-alpine
    container_name: librarium-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: librarium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    container_name: librarium-auth
    ports:
      - "3000:3000"
    env_file: ./auth-service/.env
    environment:
      SERVER_HOST: 0.0.0.0          
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: librarium
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  books-service:
    build: ./books-service
    container_name: librarium-books
    ports:
      - "3001:3001"
    env_file: ./books-service/.env
    environment:
      SERVER_HOST: 0.0.0.0          # ← Добавлено для консистентности (хотя books уже работал)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: librarium
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/books/featured"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build: ./gateway
    container_name: librarium-gateway
    ports:
      - "8080:8080"
    env_file: ./gateway/.env
    depends_on:
      - auth-service
      - books-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: