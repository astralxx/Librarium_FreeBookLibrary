version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: librarium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "3000:3000"
    env_file: ./auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  books-service:
    build: ./books-service
    ports:
      - "3001:3001"
    env_file: ./books-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    env_file: ./gateway/.env
    depends_on:
      - auth-service
      - books-service

volumes:
  postgres_data: